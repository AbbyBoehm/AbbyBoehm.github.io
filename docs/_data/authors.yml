# The primary author of this blog.
# Must be the same as `author` in `_config.yml`.
# Change `author1` to your shortname.
author1:

  name:              <Abby> <Boehm>
  email:             <vab55@cornell.edu>

  # Used at the bottom of each page and at the top of the `about` layout
  # Markdown enabled, can use multiple paragraphs (enabled by `|`)
  about:             |
    I am a PhD candidate in the Department of Astronomy at Cornell University,
    originally hailing from a little coal town in western Pennsylvania.
    Exoplanetary sciences have been my lifelong passion and I am thrilled
    to be at the forefront of what we know about worlds beyond our Solar System.
    My research focuses on characterizing exoplanetary atmospheres through transmission
    spectroscopy, with a strong empahsis on the use of ultraviolet wavelengths and on the
    development of software for treating and/or interpreting data. When I'm not doing research,
    you can find me engaged in a variety of creative hobbies.

  # This photo will be used in the about section
  picture:
    path:            ../assets/img/profilepic_1x.jpg
    # srcset is optional, but can be used to provide higher res versions for retina displays
    srcset:
      1x:            ../assets/img/profilepic_1x.jpg
      2x:            ../assets/img/profilepic_2x.jpg
      4x:            ../assets/img/profilepic_4x.jpg

